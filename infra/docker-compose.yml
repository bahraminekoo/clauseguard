services:
  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ALLOW_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ../frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
